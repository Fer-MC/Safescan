<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azul:     #1B2F4E;
    --azul-700: #243f6a;
    --naranja:  #E8611A;
    --naranja-600: #c9521a;
    --gris:     #4A5568;
    --bg:       #F7F8FA;
    --surface:  #ffffff;
    --text:     #1A202C;
    --muted:    #4A5568;
    --border:   #e3e8ef;
    /* niveles de observación */
    --c-critical:   #f5b7b1;  --c-critical-b:   #A32D2D;
    --c-important:  #fae5d3;  --c-important-b:  #E8611A;
    --c-minor:      #fcf3cf;  --c-minor-b:      #d4ac0d;
    --c-conform:    #d4efdf;  --c-conform-b:    #3B6D11;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(27,47,78,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* --- Cabecera --- */
  header {
    background: var(--azul);
    color: #fff; padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: .85rem;
    position: sticky; top: 0; z-index: 30;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  .logo-mark {
    width: 36px; height: 36px; background: var(--naranja);
    border-radius: 9px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .logo-mark svg { width: 20px; height: 20px; }
  header h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: -.02em; flex: 1; }
  .tag { font-size: .7rem; color: rgba(255,255,255,.65); margin-top: .1rem; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: .5rem; }

  /* --- Menú hamburguesa --- */
  .menu-wrap { position: relative; }
  .menu-btn {
    background: rgba(255,255,255,.12); border: none; border-radius: 8px;
    color: #fff; width: 36px; height: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .menu-btn svg { width: 18px; height: 18px; }
  .menu {
    display: none; position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow);
    min-width: 160px; overflow: hidden; z-index: 40;
  }
  .menu.open { display: block; }
  .menu-label { font-size: .72rem; font-weight: 600; color: var(--muted);
    padding: .6rem 1rem .3rem; text-transform: uppercase; letter-spacing: .05em; }
  .lang-opt {
    display: flex; align-items: center; gap: .6rem;
    width: 100%; background: none; border: none; cursor: pointer;
    padding: .6rem 1rem; font-size: .9rem; color: var(--text); text-align: left;
  }
  .lang-opt:hover { background: var(--bg); }
  .lang-opt.active { color: var(--naranja); font-weight: 600; }
  .lang-opt .code { font-family: 'JetBrains Mono', monospace; font-size: .75rem;
    background: var(--bg); border-radius: 5px; padding: .1rem .4rem; }

  /* --- Main --- */
  main { max-width: 540px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

  /* --- Aviso legal (discreto, abajo) --- */
  .legal {
    font-size: .72rem; color: var(--muted); background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    padding: .6rem .9rem; margin-bottom: 1.2rem;
    display: flex; gap: .4rem; align-items: flex-start;
  }

  /* --- Hero --- */
  .hero { margin-bottom: 1.5rem; }
  .hero h2 { font-size: 1.45rem; font-weight: 800; line-height: 1.25;
    letter-spacing: -.02em; color: var(--azul); }
  .hero p { margin-top: .5rem; font-size: .9rem; color: var(--muted); }

  /* --- Dropzone --- */
  .dropzone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    background: var(--surface); padding: 2.2rem 1.5rem;
    text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--naranja); background: #fff7f3; }
  .dz-icon { margin-bottom: .75rem; }
  .dz-icon svg { width: 40px; height: 40px; stroke: var(--naranja); opacity: .7; }
  .dropzone h3 { font-size: 1rem; font-weight: 600; margin-bottom: .35rem; }
  .dropzone .hint { font-size: .78rem; color: var(--muted); }
  .dropzone input[type=file] { display: none; }
  .privacy-note { font-size: .75rem; color: var(--muted); text-align: center;
    margin-top: .7rem; opacity: .85; }

  /* --- Preview --- */
  .preview-wrap { display: none; }
  .preview-wrap.show { display: block; }
  .preview {
    position: relative; border-radius: var(--radius); overflow: hidden;
    background: #000; margin-bottom: .85rem;
  }
  .preview img { width: 100%; display: block; max-height: 320px; object-fit: contain; }
  .scanline {
    position: absolute; top: 0; left: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, transparent, var(--naranja), transparent);
    animation: scan 1.8s ease-in-out infinite; opacity: 0;
  }
  .preview.scanning .scanline { opacity: 1; }
  @keyframes scan { 0%,100%{top:0} 50%{top:calc(100% - 3px)} }
  .scan-status {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: rgba(0,0,0,.55); color: #fff;
    font-size: .8rem; padding: .5rem .75rem;
    display: flex; align-items: center; gap: .5rem;
    opacity: 0; transition: opacity .25s;
  }
  .preview.scanning .scan-status { opacity: 1; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- Botones --- */
  .actions { display: flex; gap: .6rem; margin-bottom: .5rem; }
  .btn {
    flex: 1; padding: .75rem 1rem; border: none; border-radius: 10px;
    font-family: inherit; font-size: .9rem; font-weight: 600;
    cursor: pointer; transition: background .18s, opacity .18s;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--naranja); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--naranja-600); }
  .btn-ghost { background: var(--surface); color: var(--text);
    border: 1px solid var(--border); flex: 0 0 auto; padding: .75rem 1.1rem; }
  .btn-ghost:hover { background: var(--bg); }

  /* --- Resultados --- */
  .results { display: none; }
  .results.show { display: block; }
  .summary {
    background: var(--azul); color: #fff; border-radius: var(--radius);
    padding: 1.1rem 1.25rem; margin-bottom: 1rem;
    display: flex; align-items: flex-start; gap: 1rem;
  }
  .count { font-size: 2.2rem; font-weight: 800; line-height: 1;
    flex-shrink: 0; color: var(--naranja); }
  .count small { display: block; font-size: .6rem; font-weight: 600;
    letter-spacing: .08em; color: rgba(255,255,255,.65); margin-top: .15rem; }
  .summary p { font-size: .88rem; color: rgba(255,255,255,.85); padding-top: .15rem; }
  .section-title { font-size: .72rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: .6rem; }

  /* --- Tarjetas de observación --- */
  .risk {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: .75rem;
    border-left: 4px solid var(--border);
  }
  .risk[data-c=critical]  { border-left-color: var(--c-critical-b);  background: #fff8f8; }
  .risk[data-c=important] { border-left-color: var(--c-important-b); background: #fffaf7; }
  .risk[data-c=minor]     { border-left-color: var(--c-minor-b);     background: #fffef5; }
  .risk[data-c=conform]   { border-left-color: var(--c-conform-b);   background: #f7fff9; }
  .risk-head { display: flex; align-items: flex-start; gap: .5rem; margin-bottom: .4rem; }
  .risk-head h4 { font-size: .93rem; font-weight: 600; flex: 1; }
  .badge {
    font-size: .68rem; font-weight: 700; padding: .2rem .55rem;
    border-radius: 6px; white-space: nowrap; flex-shrink: 0;
  }
  .b-critical  { background: var(--c-critical);  color: var(--c-critical-b); }
  .b-important { background: var(--c-important); color: var(--c-important-b); }
  .b-minor     { background: var(--c-minor);     color: var(--c-minor-b); }
  .b-conform   { background: var(--c-conform);   color: var(--c-conform-b); }
  .desc { font-size: .86rem; color: var(--text); margin-bottom: .5rem; }
  .meta { display: flex; flex-wrap: wrap; gap: .35rem .75rem;
    font-size: .78rem; color: var(--muted); margin-bottom: .5rem; }
  ul { margin-left: 1.1rem; font-size: .84rem; color: var(--text); margin-bottom: .5rem; }
  .norm { display: flex; flex-wrap: wrap; gap: .25rem; margin-top: .4rem; }
  .norm span { font-size: .72rem; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: .2rem .55rem; margin: .15rem .25rem 0 0; }
  .verify { font-size: .74rem; color: var(--naranja); font-weight: 600; margin-top: .5rem; }

  .limits {
    background: #fffdf5; border: 1px solid #f0e6c8; border-radius: 12px;
    padding: 1rem 1.2rem; margin-top: 1rem;
  }
  .limits h4 { font-size: .9rem; margin-bottom: .4rem; }
  .limits ul { margin-left: 1.1rem; font-size: .84rem; color: #6b5d2f; }

  .report-box { background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem; margin-top: 1.5rem; }
  .report-box h4 { font-size: .98rem; margin-bottom: .8rem; }
  .field { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .7rem; }
  .field label { font-size: .78rem; font-weight: 600; color: var(--muted); }
  .field input { font-family: inherit; font-size: .9rem; padding: .6rem .75rem;
    border: 1px solid var(--border); border-radius: 9px; }
  .field input:focus { outline: 2px solid var(--naranja); border-color: transparent; }

  .toast {
    position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%) translateY(120%);
    background: #2b2b2b; color: #fff; padding: .8rem 1.2rem; border-radius: 11px;
    font-size: .88rem; box-shadow: 0 8px 30px rgba(0,0,0,.25); z-index: 50;
    transition: transform .3s ease; max-width: 90vw;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { background: #A32D2D; }

  footer { text-align: center; color: var(--muted); font-size: .76rem; padding: 2rem 1rem; }
</style>

</header>

<main>
  <section class="hero">

    <p data-i18n="hero_sub"></p>

  <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Subir imagen">

    <input type="file" id="fileInput" accept="image/*" style="display:none">

  <p class="privacy-note" data-i18n="img_note"></p>

      <img id="previewImg" alt="">

    </div>
    <div class="actions">
      <button class="btn btn-primary" id="analyzeBtn" data-i18n="btn_analyze"></button>
      <button class="btn btn-ghost" id="resetBtn" data-i18n="btn_change"></button>
    </div>
  </div>

  <section class="results" id="results">

      </div>
      <div class="field">

      <div class="field">
        <label for="respZona" data-i18n="f_zone_lead"></label>

      </div>
      <div class="field">
        <label for="supervisor" data-i18n="f_supervisor"></label>
        <input type="text" id="supervisor" data-i18n-ph="ph_supervisor">
      </div>
      <button class="btn btn-primary" id="reportBtn" data-i18n="btn_report"></button>
    </div>
  </section>

  <div class="legal">
    <span aria-hidden="true">ℹ️</span>
    <span data-i18n="legal"></span>
  </div>
</main>

<div class="toast" id="toast"></div>
<footer data-i18n="footer"></footer>

      report_title: "📄 Genera informe Word",
      f_company: "Empresa (opcional)", ph_company: "La meva Empresa SL",
      f_site: "Centre de treball (opcional)", ph_site: "Planta de producció",
      f_inspector: "Responsable (opcional)", ph_inspector: "Nom i cognoms",
      f_zone_lead: "Responsable de zona (opcional)", ph_zone_lead: "Nom i cognoms",
      f_supervisor: "Supervisor (opcional)", ph_supervisor: "Nom i cognoms",
      btn_report: "Descarrega informe .docx",
      btn_reporting: "Generant…",
      report_ok: "Informe descarregat. Recorda validar-lo presencialment.",
      report_err: "No s'ha pogut generar l'informe.",
      footer: "VETLLA · Eina de suport per a informes de seguretat industrial.",
      menu_language: "Idioma",
      m_bad_format: "Format no vàlid. Fes servir JPG, PNG o WEBP.",
      m_too_big: "La imatge supera els 5 MB.",
      m_conn: "Error de connexió. Revisa la xarxa i torna-ho a provar.",
      m_fail: "No s'ha pogut completar l'anàlisi.",
      lbl_loc: "Ubicació", lbl_conf: "Confiança IA", lbl_actions: "Acció recomanada",
      verify: "↪ Requereix verificació presencial",
      clas: { critical: "Crítica", important: "Important", minor: "Menor", conform: "Conforme" },
      conf: { high: "Alta", medium: "Mitjana", low: "Baixa" },
    },
  };

  const SUPPORTED = ["es", "en", "ca"];
  const LS_KEY = "vetlla_lang";

  // El catalán está oculto en el menú (pendiente de validar calidad de la IA en ca).
  // Mientras esté oculto, no debe poder activarse solo (ni por idioma guardado, ni por
  // idioma del navegador) para evitar analizar/informar en un idioma que el usuario no eligió.
  const CA_ENABLED = false;

  function detectLang() {
    const saved = localStorage.getItem(LS_KEY);
    if (saved && SUPPORTED.includes(saved) && (CA_ENABLED || saved !== "ca")) return saved;
    const nav = (navigator.language || "es").slice(0, 2).toLowerCase();
    if (SUPPORTED.includes(nav) && (CA_ENABLED || nav !== "ca")) return nav;
    return "es";
  }

  let lang = detectLang();

  const $ = (id) => document.getElementById(id);

  function applyLang() {
    const t = I18N[lang];
    document.documentElement.lang = t.htmlLang;

    document.querySelectorAll("[data-i18n]").forEach((el) => {
      const key = el.getAttribute("data-i18n");
      if (t[key] !== undefined) el.textContent = t[key];
    });
    document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
      const key = el.getAttribute("data-i18n-ph");
      if (t[key] !== undefined) el.placeholder = t[key];
    });

    $("scanText").textContent = t.scan_text;

    document.querySelectorAll(".lang-opt").forEach((b) =>
      b.classList.toggle("active", b.dataset.lang === lang));

    if (lastAnalysis) renderResults(lastAnalysis);
  }

  // --- Menú ---
  const menuBtn = $("menuBtn"), menu = $("menu");
  menuBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = menu.classList.toggle("open");
    menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
  });
  document.addEventListener("click", () => { menu.classList.remove("open"); menuBtn.setAttribute("aria-expanded", "false"); });
  menu.addEventListener("click", (e) => e.stopPropagation());
  document.querySelectorAll(".lang-opt").forEach((b) => {
    b.addEventListener("click", () => {
      lang = b.dataset.lang;
      localStorage.setItem(LS_KEY, lang);
      menu.classList.remove("open");
      menuBtn.setAttribute("aria-expanded", "false");
      applyLang();
    });
  });

  // ---------------------------------------------------------------------
  // Lógica principal
  // ---------------------------------------------------------------------
  const dropzone = $("dropzone"), fileInput = $("fileInput");
  const previewWrap = $("previewWrap"), preview = $("preview"), previewImg = $("previewImg");
  const analyzeBtn = $("analyzeBtn"), resetBtn = $("resetBtn"), reportBtn = $("reportBtn");
  const results = $("results"), toast = $("toast");
  let currentFile = null, lastAnalysis = null, analysisLang = null;

  dropzone.addEventListener("click", () => fileInput.click());
  dropzone.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } });
  fileInput.addEventListener("change", (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

  dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
  dropzone.addEventListener("drop", (e) => {
    e.preventDefault(); dropzone.classList.remove("drag");
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });

  function handleFile(file) {
    const t = I18N[lang];
    const ok = ["image/jpeg", "image/png", "image/webp"];
    if (!ok.includes(file.type)) return showToast(t.m_bad_format, true);
    if (file.size > 5 * 1024 * 1024) return showToast(t.m_too_big, true);
    currentFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewWrap.classList.add("show");
    results.classList.remove("show");
    dropzone.style.display = "none";
    previewWrap.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

resetBtn.addEventListener("click", () => {
    currentFile = null; lastAnalysis = null; analysisLang = null;
    fileInput.value = "";
    previewWrap.classList.remove("show"); results.classList.remove("show");
    dropzone.style.display = "block";
  });

  analyzeBtn.addEventListener("click", async () => {
    if (!currentFile) return;
    const t = I18N[lang];
    setScanning(true);
    const form = new FormData();
    form.append("file", currentFile);
    form.append("lang", lang);
    try {
      const res = await fetch("/api/analyze", { method: "POST", body: form });
      const json = await res.json();
      if (!res.ok) {
        setScanning(false);
        return showToast(json.message || t.m_fail, true);
      }
      lastAnalysis = json.data;
      analysisLang = lang;
      renderResults(json.data);
    } catch {
      showToast(t.m_conn, true);
    } finally {
      setScanning(false);
    }
  });

  function setScanning(on) {
    const t = I18N[lang];
    preview.classList.toggle("scanning", on);
    analyzeBtn.disabled = on;
    analyzeBtn.textContent = on ? t.btn_analyzing : t.btn_analyze;
  }

  function renderResults(data) {
    const t = I18N[lang];
    const obs = data.observaciones || [];
    const n = data.num_observaciones ?? obs.length;
    $("riskCount").innerHTML = `${n}<small>${t.obs_label}</small>`;
    $("summaryText").textContent = data.resumen || t.summary_done;
    const list = $("riskList"); list.innerHTML = "";

    if (!obs.length) {
      list.innerHTML = `<div class="risk"><p class="desc">${esc(t.no_obs)}</p></div>`;
    }
    obs.forEach((r) => {
      const c = r.clasificacion || "important";
      const el = document.createElement("div");
      el.className = "risk"; el.dataset.c = c;
      el.innerHTML = `
        <div class="risk-head">
          <h4>${esc(r.categoria)}</h4>
          <span class="badge b-${c}">${esc(t.clas[c] || c)}</span>
        </div>
        <p class="desc">${esc(r.descripcion)}</p>
        <div class="meta">
          <span><b>${esc(t.lbl_conf)}:</b> ${esc(t.conf[r.confianza] || r.confianza)}</span>
          ${r.ubicacion ? `<span><b>${esc(t.lbl_loc)}:</b> ${esc(r.ubicacion)}</span>` : ""}
        </div>
        ${r.acciones?.length ? `<b style="font-size:.8rem">${esc(t.lbl_actions)}</b><ul>${r.acciones.map(m => `<li>${esc(m)}</li>`).join("")}</ul>` : ""}
        ${r.normativa?.length ? `<div class="norm">${r.normativa.map(x => `<span>${esc(x)}</span>`).join("")}</div>` : ""}
        ${r.requiere_verificacion ? `<div class="verify">${esc(t.verify)}</div>` : ""}`;
      list.appendChild(el);
    });

    const limitsBox = $("limitsBox"), limitsList = $("limitsList");
    if (data.limitaciones?.length) {
      limitsList.innerHTML = data.limitaciones.map(l => `<li>${esc(l)}</li>`).join("");
      limitsBox.style.display = "block";
    } else { limitsBox.style.display = "none"; }

    results.classList.add("show");
    results.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  reportBtn.addEventListener("click", async () => {
    if (!lastAnalysis) return;
    // Usa SIEMPRE el idioma con el que se hizo el análisis (analysisLang), no el idioma
    // que la interfaz tenga seleccionado en este momento. Evita informes con la estructura
    // en un idioma y el contenido de la IA en otro si el usuario cambia el selector entre
    // analizar y descargar.
    const reportLang = analysisLang || lang;
    const t = I18N[lang];
    reportBtn.disabled = true; reportBtn.textContent = t.btn_reporting;
    try {
      const form = new FormData();
      form.append("payload", JSON.stringify(lastAnalysis));
      form.append("empresa", $("empresa").value);
      form.append("centro", $("centro").value);
      form.append("responsable", $("responsable").value);
      form.append("resp_zona", $("respZona").value);
      form.append("supervisor", $("supervisor").value);
      form.append("lang", reportLang);
      if (currentFile) form.append("image", currentFile);
      const res = await fetch("/api/report", { method: "POST", body: form });
      if (!res.ok) throw new Error();
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = ({es:"Informe_seguridad_VETLLA.docx", en:"VETLLA_safety_report.docx", ca:"Informe_seguretat_VETLLA.docx"})[reportLang];
      a.click();
      URL.revokeObjectURL(url);
      showToast(t.report_ok);
    } catch {
      showToast(t.report_err, true);
    } finally {
      reportBtn.disabled = false; reportBtn.textContent = t.btn_report;
    }
  });

  function showToast(msg, isError = false) {
    toast.textContent = msg; toast.className = "toast show" + (isError ? " err" : "");
    setTimeout(() => toast.classList.remove("show"), 3800);
  }
  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  applyLang();
})();
</script>
</body>
</html>
