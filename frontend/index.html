<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H&S Detect — Inspección de seguridad con IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1a2f4e;
    --azul-700: #23416b;
    --verde: #2ecc71;
    --verde-600: #27ae60;
    --ambar: #f4a259;
    --bg: #f5f7fa;
    --surface: #ffffff;
    --text: #1a2333;
    --muted: #5b6b82;
    --border: #e3e8ef;
    /* niveles de observación */
    --c-critical: #f5b7b1;  --c-critical-b: #c0392b;
    --c-important: #fae5d3; --c-important-b: #e67e22;
    --c-minor: #fcf3cf;     --c-minor-b: #d4ac0d;
    --c-conform: #d4efdf;   --c-conform-b: #27ae60;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(26,47,78,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* --- Cabecera --- */
  header {
    background: var(--azul);
    color: #fff; padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: .65rem;
    position: sticky; top: 0; z-index: 20;
  }
  .logo-mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--verde), var(--verde-600));
    display: grid; place-items: center; flex: none;
  }
  .logo-mark svg { width: 20px; height: 20px; }
  header h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: -.01em; }
  header .tag { font-size: .7rem; color: #9db4d4; font-weight: 500; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: .6rem; }
  .free-pill {
    font-size: .72rem; font-weight: 600;
    background: rgba(255,255,255,.12); padding: .35rem .7rem; border-radius: 999px;
    white-space: nowrap;
  }

  /* --- Menú hamburguesa / idioma --- */
  .menu-wrap { position: relative; }
  .menu-btn {
    width: 38px; height: 38px; border-radius: 10px; border: none; cursor: pointer;
    background: rgba(255,255,255,.12); color: #fff;
    display: grid; place-items: center; transition: background .2s;
  }
  .menu-btn:hover { background: rgba(255,255,255,.22); }
  .menu-btn svg { width: 20px; height: 20px; }
  .menu {
    position: absolute; right: 0; top: 46px; min-width: 180px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 12px 40px rgba(26,47,78,.18);
    padding: .5rem; opacity: 0; visibility: hidden; transform: translateY(-6px);
    transition: opacity .18s, transform .18s, visibility .18s; z-index: 30;
  }
  .menu.open { opacity: 1; visibility: visible; transform: translateY(0); }
  .menu-label {
    font-size: .68rem; text-transform: uppercase; letter-spacing: .07em;
    color: var(--muted); font-weight: 700; padding: .4rem .6rem .25rem;
  }
  .lang-opt {
    display: flex; align-items: center; gap: .6rem; width: 100%;
    background: none; border: none; cursor: pointer; text-align: left;
    font-family: inherit; font-size: .9rem; color: var(--text);
    padding: .55rem .6rem; border-radius: 8px; transition: background .15s;
  }
  .lang-opt:hover { background: #f1f5f9; }
  .lang-opt .code {
    font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: .78rem;
    background: #eef2f7; color: var(--azul-700);
    padding: .12rem .4rem; border-radius: 5px; min-width: 30px; text-align: center;
  }
  .lang-opt.active { background: #f6fdf9; }
  .lang-opt.active .code { background: var(--verde); color: #073d20; }

  main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

  .legal {
    background: #fff7ed; border: 1px solid #fed7aa;
    color: #7c4a16; font-size: .8rem; padding: .75rem .9rem;
    border-radius: 10px; margin-bottom: 1.5rem;
    display: flex; gap: .55rem; align-items: flex-start;
  }
  .legal strong { font-weight: 700; }

  .hero h2 { font-size: 1.65rem; font-weight: 800; letter-spacing: -.02em; line-height: 1.2; }
  .hero p { color: var(--muted); margin-top: .4rem; max-width: 52ch; }

  .dropzone {
    margin-top: 1.5rem; border: 2px dashed var(--border);
    background: var(--surface); border-radius: var(--radius);
    padding: 2.5rem 1.5rem; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s, transform .15s;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--verde); background: #f6fdf9; }
  .dropzone:active { transform: scale(.995); }
  .dz-icon {
    width: 52px; height: 52px; margin: 0 auto .8rem; border-radius: 14px;
    background: #eef6ff; color: var(--azul); display: grid; place-items: center;
  }
  .dz-icon svg { width: 26px; height: 26px; }
  .dropzone h3 { font-size: 1rem; font-weight: 600; }
  .dropzone .hint { color: var(--muted); font-size: .82rem; margin-top: .25rem; }
  input[type=file] { display: none; }

  .preview-wrap { margin-top: 1.25rem; display: none; }
  .preview-wrap.show { display: block; }
  .preview {
    position: relative; border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); background: #000;
  }
  .preview img { width: 100%; display: block; max-height: 460px; object-fit: contain; }
  .scanline {
    position: absolute; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--verde), transparent);
    box-shadow: 0 0 16px 3px rgba(46,204,113,.55);
    opacity: 0; pointer-events: none;
  }
  .preview.scanning .scanline { opacity: 1; animation: scan 1.6s ease-in-out infinite; }
  .preview.scanning::after {
    content: ""; position: absolute; inset: 0;
    background: rgba(26,47,78,.35);
  }
  @keyframes scan { 0% { top: 2%; } 50% { top: 96%; } 100% { top: 2%; } }
  @media (prefers-reduced-motion: reduce) {
    .preview.scanning .scanline { animation: none; top: 50%; }
  }
  .scan-status {
    position: absolute; bottom: 12px; left: 12px; z-index: 2;
    color: #fff; font-size: .8rem; font-weight: 600;
    display: none; align-items: center; gap: .5rem;
  }
  .preview.scanning .scan-status { display: flex; }
  .spinner {
    width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.35);
    border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
    font-family: inherit; font-weight: 600; font-size: .92rem;
    border: none; border-radius: 11px; padding: .8rem 1.3rem; cursor: pointer;
    transition: transform .12s, box-shadow .2s, background .2s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--verde); color: #073d20; }
  .btn-primary:hover { background: var(--verde-600); color: #fff; }
  .btn-primary:disabled { background: #b8d8c5; color: #6b8a78; cursor: not-allowed; }
  .btn-ghost { background: var(--surface); color: var(--azul); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--azul); }
  .actions { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: .65rem; }

  .results { display: none; margin-top: 2rem; }
  .results.show { display: block; animation: fadeUp .4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .summary {
    background: var(--azul); color: #fff; border-radius: var(--radius);
    padding: 1.25rem 1.4rem; display: flex; gap: 1.2rem; align-items: center;
  }
  .summary .count { font-size: 2.4rem; font-weight: 800; line-height: 1; }
  .summary .count small { display: block; font-size: .68rem; font-weight: 500; color: #9db4d4; }
  .summary p { font-size: .9rem; color: #d6e2f2; }

  .section-title { font-size: .78rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); font-weight: 700; margin: 1.75rem 0 .75rem; }

  .risk {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 5px solid var(--border); border-radius: 12px;
    padding: 1.1rem 1.2rem; margin-bottom: .9rem;
  }
  .risk-head { display: flex; align-items: flex-start; gap: .75rem; flex-wrap: wrap; }
  .risk-head h4 { font-size: 1.02rem; font-weight: 700; flex: 1; min-width: 60%; }
  .badge {
    font-size: .68rem; font-weight: 700; padding: .25rem .6rem; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .03em; white-space: nowrap;
  }
  .risk[data-c="critical"]  { border-left-color: var(--c-critical-b); }
  .risk[data-c="important"] { border-left-color: var(--c-important-b); }
  .risk[data-c="minor"]     { border-left-color: var(--c-minor-b); }
  .risk[data-c="conform"]   { border-left-color: var(--c-conform-b); }
  .b-critical  { background: var(--c-critical);  color: #8c2620; }
  .b-important { background: var(--c-important); color: #a8540f; }
  .b-minor     { background: var(--c-minor);     color: #8a6d0b; }
  .b-conform   { background: var(--c-conform);   color: #1d6b42; }

  .risk p.desc { color: var(--text); font-size: .9rem; margin: .55rem 0; }
  .risk .meta { display: flex; flex-wrap: wrap; gap: .4rem .9rem; font-size: .78rem; color: var(--muted); margin-bottom: .5rem; }
  .risk .meta b { color: var(--text); font-weight: 600; }
  .risk ul { margin: .4rem 0 0 1.1rem; font-size: .86rem; }
  .risk ul li { margin-bottom: .2rem; }
  .norm { margin-top: .55rem; }
  .norm span { display: inline-block; background: #eef2f7; color: var(--azul-700);
    font-size: .72rem; padding: .2rem .55rem; border-radius: 6px; margin: .15rem .25rem 0 0; }
  .verify { font-size: .74rem; color: var(--ambar); font-weight: 600; margin-top: .5rem; }

  .limits {
    background: #fffdf5; border: 1px solid #f0e6c8; border-radius: 12px;
    padding: 1rem 1.2rem; margin-top: 1rem;
  }
  .limits h4 { font-size: .9rem; margin-bottom: .4rem; }
  .limits ul { margin-left: 1.1rem; font-size: .84rem; color: #6b5d2f; }

  .report-box { background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem; margin-top: 1.5rem; }
  .report-box h4 { font-size: .98rem; margin-bottom: .8rem; }
  .field { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .7rem; }
  .field label { font-size: .78rem; font-weight: 600; color: var(--muted); }
  .field input { font-family: inherit; font-size: .9rem; padding: .6rem .75rem;
    border: 1px solid var(--border); border-radius: 9px; }
  .field input:focus { outline: 2px solid var(--verde); border-color: transparent; }

  .toast {
    position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%) translateY(120%);
    background: #2b2b2b; color: #fff; padding: .8rem 1.2rem; border-radius: 11px;
    font-size: .88rem; box-shadow: 0 8px 30px rgba(0,0,0,.25); z-index: 50;
    transition: transform .3s ease; max-width: 90vw;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { background: #c0392b; }

  footer { text-align: center; color: var(--muted); font-size: .76rem; padding: 2rem 1rem; }
</style>
</head>
<body>
<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#073d20" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2 4 5v6c0 5 3.5 8 8 11 4.5-3 8-6 8-11V5z"/><path d="m9 12 2 2 4-4"/>
    </svg>
  </div>
  <div>
    <h1>H&S Detect</h1>
    <div class="tag" data-i18n="tagline">Inspección de seguridad con IA</div>
  </div>
  <div class="header-right">
    <div class="free-pill" id="freePill"></div>
    <div class="menu-wrap">
      <button class="menu-btn" id="menuBtn" aria-label="Menú" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="menu" id="menu" role="menu">
        <div class="menu-label" data-i18n="menu_language">Idioma</div>
        <button class="lang-opt" data-lang="ca" role="menuitem"><span class="code">CA</span><span>Català</span></button>
        <button class="lang-opt" data-lang="es" role="menuitem"><span class="code">ES</span><span>Español</span></button>
        <button class="lang-opt" data-lang="en" role="menuitem"><span class="code">EN</span><span>English</span></button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="legal">
    <span aria-hidden="true">⚠️</span>
    <span data-i18n="legal"></span>
  </div>

  <section class="hero">
    <h2 data-i18n="hero_title"></h2>
    <p data-i18n="hero_sub"></p>
  </section>

  <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Subir imagen">
    <div class="dz-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <h3 data-i18n="dz_title"></h3>
    <div class="hint" data-i18n="dz_hint"></div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
  </div>

  <div class="preview-wrap" id="previewWrap">
    <div class="preview" id="preview">
      <img id="previewImg" alt="">
      <div class="scanline"></div>
      <div class="scan-status"><span class="spinner"></span><span id="scanText"></span></div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="analyzeBtn" data-i18n="btn_analyze"></button>
      <button class="btn btn-ghost" id="resetBtn" data-i18n="btn_change"></button>
    </div>
  </div>

  <section class="results" id="results">
    <div class="summary">
      <div class="count" id="riskCount">0<small data-i18n="obs_label"></small></div>
      <p id="summaryText"></p>
    </div>

    <div class="section-title" data-i18n="obs_section"></div>
    <div id="riskList"></div>

    <div class="limits" id="limitsBox" style="display:none">
      <h4 data-i18n="limits_title"></h4>
      <ul id="limitsList"></ul>
    </div>

    <div class="report-box">
      <h4 data-i18n="report_title"></h4>
      <div class="field">
        <label for="empresa" data-i18n="f_company"></label>
        <input type="text" id="empresa" data-i18n-ph="ph_company">
      </div>
      <div class="field">
        <label for="centro" data-i18n="f_site"></label>
        <input type="text" id="centro" data-i18n-ph="ph_site">
      </div>
      <div class="field">
        <label for="responsable" data-i18n="f_inspector"></label>
        <input type="text" id="responsable" data-i18n-ph="ph_inspector">
      </div>
      <button class="btn btn-primary" id="reportBtn" data-i18n="btn_report"></button>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>
<footer data-i18n="footer"></footer>

      f_company: "Empresa (opcional)", ph_company: "La meva Empresa SL",
      f_site: "Centre de treball (opcional)", ph_site: "Planta d'Igualada",
      f_inspector: "Responsable de la inspecció (opcional)", ph_inspector: "Nom i cognoms",
      btn_report: "Descarrega informe .docx",
      btn_reporting: "Generant…",
      report_ok: "Informe descarregat. Recorda validar-lo presencialment.",
      report_err: "No s'ha pogut generar l'informe.",
      footer: "H&S Detect · Informe d'inspecció de suport — no substitueix l'avaluació legal.",
      free_some: (n) => `${n} anàlisis gratis`,
      free_none: "Sense anàlisis gratis",
      menu_language: "Idioma",
      m_bad_format: "Format no vàlid. Fes servir JPG, PNG o WEBP.",
      m_too_big: "La imatge supera els 5 MB.",
      m_conn: "Error de connexió. Revisa la xarxa i torna-ho a provar.",
      m_fail: "No s'ha pogut completar la inspecció.",
      lbl_loc: "Ubicació", lbl_conf: "Confiança IA", lbl_actions: "Acció recomanada",
      verify: "↪ Requereix verificació presencial",
      clas: { critical: "Crítica", important: "Important", minor: "Menor", conform: "Conforme" },
      conf: { high: "Alta", medium: "Mitjana", low: "Baixa" },
    },
  };

  const SUPPORTED = ["es", "en", "ca"];
  const LS_KEY = "hs_lang";

  function detectLang() {
    const saved = localStorage.getItem(LS_KEY);
    if (saved && SUPPORTED.includes(saved)) return saved;
    const nav = (navigator.language || "es").slice(0, 2).toLowerCase();
    return SUPPORTED.includes(nav) ? nav : "es";
  }

  let lang = detectLang();
  let lastFreeRemaining = null;

  const $ = (id) => document.getElementById(id);

  function applyLang() {
    const t = I18N[lang];
    document.documentElement.lang = t.htmlLang;

    // textos con data-i18n
    document.querySelectorAll("[data-i18n]").forEach((el) => {
      const key = el.getAttribute("data-i18n");
      if (key === "legal") { el.innerHTML = t.legalHTML; return; }
      if (t[key] !== undefined) el.textContent = t[key];
    });
    // placeholders
    document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
      const key = el.getAttribute("data-i18n-ph");
      if (t[key] !== undefined) el.placeholder = t[key];
    });

    $("scanText").textContent = t.scan_text;

    // marcar opción activa en el menú
    document.querySelectorAll(".lang-opt").forEach((b) =>
      b.classList.toggle("active", b.dataset.lang === lang));

    // refrescar píldora freemium
    if (lastFreeRemaining !== null) updateFreePill(lastFreeRemaining);
    else $("freePill").textContent = t.free_some(3);

    // re-render de resultados si los hay
    if (lastAnalysis) renderResults(lastAnalysis);
  }

  // --- Menú ---
  const menuBtn = $("menuBtn"), menu = $("menu");
  menuBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = menu.classList.toggle("open");
    menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
  });
  document.addEventListener("click", () => { menu.classList.remove("open"); menuBtn.setAttribute("aria-expanded", "false"); });
  menu.addEventListener("click", (e) => e.stopPropagation());
  document.querySelectorAll(".lang-opt").forEach((b) => {
    b.addEventListener("click", () => {
      lang = b.dataset.lang;
      localStorage.setItem(LS_KEY, lang);
      menu.classList.remove("open");
      menuBtn.setAttribute("aria-expanded", "false");
      applyLang();
    });
  });

  // ---------------------------------------------------------------------
  // Lógica principal
  // ---------------------------------------------------------------------
  const dropzone = $("dropzone"), fileInput = $("fileInput");
  const previewWrap = $("previewWrap"), preview = $("preview"), previewImg = $("previewImg");
  const analyzeBtn = $("analyzeBtn"), resetBtn = $("resetBtn"), reportBtn = $("reportBtn");
  const results = $("results"), toast = $("toast");
  let currentFile = null, lastAnalysis = null;

  dropzone.addEventListener("click", () => fileInput.click());
  dropzone.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") fileInput.click(); });
  dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
  dropzone.addEventListener("drop", (e) => {
    e.preventDefault(); dropzone.classList.remove("drag");
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener("change", (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

  function handleFile(file) {
    const t = I18N[lang];
    const ok = ["image/jpeg", "image/png", "image/webp"];
    if (!ok.includes(file.type)) return showToast(t.m_bad_format, true);
    if (file.size > 5 * 1024 * 1024) return showToast(t.m_too_big, true);
    currentFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewWrap.classList.add("show");
    results.classList.remove("show");
    dropzone.style.display = "none";
    previewWrap.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  resetBtn.addEventListener("click", () => {
    currentFile = null; lastAnalysis = null; fileInput.value = "";
    previewWrap.classList.remove("show"); results.classList.remove("show");
    dropzone.style.display = "block";
  });

  analyzeBtn.addEventListener("click", async () => {
    if (!currentFile) return;
    const t = I18N[lang];
    setScanning(true);
    const form = new FormData();
    form.append("file", currentFile);
    form.append("lang", lang);
    try {
      const res = await fetch("/api/analyze", { method: "POST", body: form });
      const json = await res.json();
      if (!res.ok) {
        setScanning(false);
        if (res.status === 402) updateFreePill(0);
        return showToast(json.message || t.m_fail, true);
      }
      lastAnalysis = json.data;
      renderResults(json.data);
      if (typeof json.free_remaining === "number") updateFreePill(json.free_remaining);
    } catch {
      showToast(t.m_conn, true);
    } finally {
      setScanning(false);
    }
  });

  function setScanning(on) {
    const t = I18N[lang];
    preview.classList.toggle("scanning", on);
    analyzeBtn.disabled = on;
    analyzeBtn.textContent = on ? t.btn_analyzing : t.btn_analyze;
  }

  function renderResults(data) {
    const t = I18N[lang];
    const obs = data.observaciones || [];
    const n = data.num_observaciones ?? obs.length;
    $("riskCount").innerHTML = `${n}<small>${t.obs_label}</small>`;
    $("summaryText").textContent = data.resumen || t.summary_done;
    const list = $("riskList"); list.innerHTML = "";

    if (!obs.length) {
      list.innerHTML = `<div class="risk"><p class="desc">${esc(t.no_obs)}</p></div>`;
    }
    obs.forEach((r) => {
      const c = r.clasificacion || "important";
      const el = document.createElement("div");
      el.className = "risk"; el.dataset.c = c;
      el.innerHTML = `
        <div class="risk-head">
          <h4>${esc(r.categoria)}</h4>
          <span class="badge b-${c}">${esc(t.clas[c] || c)}</span>
        </div>
        <p class="desc">${esc(r.descripcion)}</p>
        <div class="meta">
          <span><b>${esc(t.lbl_conf)}:</b> ${esc(t.conf[r.confianza] || r.confianza)}</span>
          ${r.ubicacion ? `<span><b>${esc(t.lbl_loc)}:</b> ${esc(r.ubicacion)}</span>` : ""}
        </div>
        ${r.acciones?.length ? `<b style="font-size:.8rem">${esc(t.lbl_actions)}</b><ul>${r.acciones.map(m => `<li>${esc(m)}</li>`).join("")}</ul>` : ""}
        ${r.normativa?.length ? `<div class="norm">${r.normativa.map(x => `<span>${esc(x)}</span>`).join("")}</div>` : ""}
        ${r.requiere_verificacion ? `<div class="verify">${esc(t.verify)}</div>` : ""}`;
      list.appendChild(el);
    });

    const limitsBox = $("limitsBox"), limitsList = $("limitsList");
    if (data.limitaciones?.length) {
      limitsList.innerHTML = data.limitaciones.map(l => `<li>${esc(l)}</li>`).join("");
      limitsBox.style.display = "block";
    } else { limitsBox.style.display = "none"; }

    results.classList.add("show");
    results.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  reportBtn.addEventListener("click", async () => {
    if (!lastAnalysis) return;
    const t = I18N[lang];
    reportBtn.disabled = true; reportBtn.textContent = t.btn_reporting;
    try {
      const form = new FormData();
      form.append("payload", JSON.stringify(lastAnalysis));
      form.append("empresa", $("empresa").value);
      form.append("centro", $("centro").value);
      form.append("responsable", $("responsable").value);
      form.append("lang", lang);
      const res = await fetch("/api/report", { method: "POST", body: form });
      if (!res.ok) throw new Error();
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = ({es:"Informe_inspeccion_HS_Detect.docx", en:"HS_Detect_inspection_report.docx", ca:"Informe_inspeccio_HS_Detect.docx"})[lang];
      a.click();
      URL.revokeObjectURL(url);
      showToast(t.report_ok);
    } catch {
      showToast(t.report_err, true);
    } finally {
      reportBtn.disabled = false; reportBtn.textContent = t.btn_report;
    }
  });

  function updateFreePill(remaining) {
    lastFreeRemaining = remaining;
    const t = I18N[lang];
    $("freePill").textContent = remaining > 0 ? t.free_some(remaining) : t.free_none;
  }
  function showToast(msg, isError = false) {
    toast.textContent = msg; toast.className = "toast show" + (isError ? " err" : "");
    setTimeout(() => toast.classList.remove("show"), 3800);
  }
  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // arranque
  applyLang();
})();
</script>
</body>
</html>
