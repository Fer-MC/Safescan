<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VETLLA — Informes de seguridad industrial con IA</title>
<meta name="description" content="Sube una foto de tu instalación. VETLLA detecta los riesgos, los clasifica por gravedad y genera un informe Word profesional en menos de 2 minutos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #1B2F4E;
    --navy-700:  #243f6a;
    --naranja:   #E8611A;
    --naranja-600: #c9521a;
    --gris:      #4A5568;
    --bg:        #F7F8FA;
    --surface:   #ffffff;
    --text:      #1A202C;
    --muted:     #4A5568;
    --border:    #e3e8ef;
    /* niveles de riesgo */
    --r-critica:   #F5B7B1;
    --r-importante:#F5D6D6;
    --r-menor:     #FBE0C7;
    --r-conforme:  #DCEBD1;
    --radius: 16px;
    --shadow-sm: 0 2px 8px rgba(27,47,78,.06);
    --shadow:    0 8px 30px rgba(27,47,78,.10);
    --maxw: 1080px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 1.25rem; }

  /* ---------- NAV ---------- */
  nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(247,248,250,.88); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner { display: flex; align-items: center; gap: 1rem; height: 64px; }
  .brand { display: flex; align-items: center; gap: .55rem; font-weight: 800;
    font-size: 1.25rem; letter-spacing: -.02em; color: var(--navy); }
  .brand .mark { width: 30px; height: 30px; background: var(--naranja);
    border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .brand .mark svg { width: 17px; height: 17px; }
  .nav-links { display: flex; gap: 1.6rem; margin-left: auto; align-items: center; }
  .nav-links a { font-size: .9rem; font-weight: 500; color: var(--muted); }
  .nav-links a:hover { color: var(--navy); }
  .lang-switch { display: flex; gap: .15rem; align-items: center; font-size: .8rem;
    font-weight: 600; color: var(--muted); }
  .lang-switch button { background: none; border: none; cursor: pointer;
    font: inherit; color: var(--muted); padding: .2rem .4rem; border-radius: 5px; }
  .lang-switch button.active { color: var(--naranja); background: #fff2ea; }
  .lang-switch .sep { opacity: .4; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
    font-family: inherit; font-weight: 600; cursor: pointer; border: none;
    border-radius: 10px; transition: background .18s, transform .1s, box-shadow .18s;
    font-size: .9rem; padding: .6rem 1.15rem; white-space: nowrap; }
  .btn-primary { background: var(--naranja); color: #fff; }
  .btn-primary:hover { background: var(--naranja-600); }
  .btn-outline { background: transparent; color: var(--navy); border: 1.5px solid var(--navy); }
  .btn-outline:hover { background: var(--navy); color: #fff; }
  .btn-lg { padding: .85rem 1.5rem; font-size: 1rem; border-radius: 12px; }
  .nav-cta { margin-left: .4rem; }
  .menu-toggle { display: none; background: none; border: none; cursor: pointer;
    color: var(--navy); width: 40px; height: 40px; margin-left: auto; }

  /* ---------- SECTION BASE ---------- */
  section { padding: 4.5rem 0; }
  .eyebrow { font-size: .78rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--naranja); margin-bottom: .8rem; }
  h2.section-title { font-size: clamp(1.5rem, 3.5vw, 2rem); font-weight: 800;
    letter-spacing: -.02em; color: var(--navy); line-height: 1.2; margin-bottom: 1rem; }
  .section-lead { font-size: 1.02rem; color: var(--muted); max-width: 640px; }

  /* ---------- HERO ---------- */
  .hero { padding: 4rem 0 4.5rem; text-align: center; }
  .hero .eyebrow { color: var(--naranja); }
  .hero h1 {
    font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 900; letter-spacing: -.03em;
    line-height: 1.15; color: var(--text); max-width: 760px; margin: 0 auto 1.1rem;
  }
  .hero p.sub { font-size: 1.05rem; color: var(--muted); max-width: 620px;
    margin: 0 auto 2rem; }
  .hero-ctas { display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .hero .reassure { font-size: .82rem; color: var(--muted); font-weight: 500; }
  .hero .reassure b { color: var(--gris); font-weight: 600; }

  /* ---------- PROBLEMA / comparison ---------- */
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
  .compare-col { border-radius: var(--radius); padding: 1.6rem; }
  .compare-col.without { background: #fff; border: 1px solid var(--border); }
  .compare-col.with { background: var(--navy); color: #fff; }
  .compare-col h4 { font-size: .8rem; letter-spacing: .06em; text-transform: uppercase;
    margin-bottom: 1rem; font-weight: 700; }
  .compare-col.without h4 { color: var(--gris); }
  .compare-col.with h4 { color: #9db4d6; }
  .compare-col li { display: flex; align-items: flex-start; gap: .6rem;
    list-style: none; padding: .5rem 0; font-size: .92rem; }
  .compare-col.without li { border-bottom: 1px solid var(--border); }
  .compare-col.with li { border-bottom: 1px solid rgba(255,255,255,.12); }
  .compare-col li:last-child { border-bottom: none; }
  .ic { flex-shrink: 0; width: 18px; height: 18px; margin-top: 1px; }
  .ic-x { color: #c0392b; }
  .ic-check { color: #6fcf97; }

  /* ---------- CÓMO FUNCIONA ---------- */
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-top: 2.5rem; }
  .step { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.6rem; box-shadow: var(--shadow-sm); }
  .step-num { font-size: .8rem; font-weight: 800; color: var(--naranja);
    letter-spacing: .05em; margin-bottom: .8rem; }
  .step h3 { font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-bottom: .5rem; }
  .step p { font-size: .9rem; color: var(--muted); }
  .pills { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; margin-top: 2.2rem; }
  .pill { font-size: .8rem; font-weight: 600; color: var(--gris);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: .4rem .9rem; }

  /* ---------- QUÉ DETECTA ---------- */
  .levels { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 2.2rem; }
  .level { border-radius: 14px; padding: 1.1rem 1.3rem; display: flex; gap: .9rem; align-items: flex-start; }
  .level .dot { width: 14px; height: 14px; border-radius: 50%; margin-top: .35rem; flex-shrink: 0; }
  .level h4 { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: .15rem; }
  .level p { font-size: .88rem; color: var(--gris); }
  .lvl-critica   { background: var(--r-critica); }
  .lvl-importante{ background: var(--r-importante); }
  .lvl-menor     { background: var(--r-menor); }
  .lvl-conforme  { background: var(--r-conforme); }
  .lvl-critica   .dot { background: #A32D2D; }
  .lvl-importante .dot { background: #E8611A; }
  .lvl-menor     .dot { background: #C77D2A; }
  .lvl-conforme  .dot { background: #3B6D11; }
  .findings { margin-top: 2rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem 1.7rem; }
  .findings h4 { font-size: .95rem; font-weight: 700; color: var(--navy); margin-bottom: .9rem; }
  .findings li { display: flex; align-items: flex-start; gap: .6rem; list-style: none;
    padding: .4rem 0; font-size: .92rem; color: var(--gris); }
  .findings li svg { flex-shrink: 0; width: 17px; height: 17px; color: var(--naranja); margin-top: 2px; }
  .footnote { font-size: .82rem; color: var(--muted); margin-top: 1.3rem; font-style: italic; }

  /* ---------- PRECIOS ---------- */
  .pricing-head { text-align: center; }
  .pricing-head .section-lead { margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-top: 2.5rem; align-items: stretch; }
  .card { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.8rem 1.5rem; display: flex; flex-direction: column;
    box-shadow: var(--shadow-sm); position: relative; }
  .card.featured { border: 2px solid var(--naranja); box-shadow: var(--shadow); }
  .badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--naranja); color: #fff; font-size: .72rem; font-weight: 700;
    padding: .3rem .85rem; border-radius: 999px; letter-spacing: .03em; white-space: nowrap; }
  .card h3 { font-size: 1.15rem; font-weight: 800; color: var(--navy); margin-bottom: .3rem; }
  .card .claim { font-size: .85rem; color: var(--muted); min-height: 1.2rem; margin-bottom: .8rem; }
  .price { font-size: 2rem; font-weight: 900; color: var(--text); letter-spacing: -.02em; }
  .price span { font-size: .95rem; font-weight: 600; color: var(--muted); }
  .price-note { font-size: .78rem; color: var(--muted); margin-top: .2rem; min-height: 1rem; }
  .card ul { list-style: none; margin: 1.2rem 0; display: flex; flex-direction: column; gap: .55rem; flex: 1; }
  .card li { display: flex; align-items: flex-start; gap: .55rem; font-size: .88rem; color: var(--gris); }
  .card li svg { flex-shrink: 0; width: 16px; height: 16px; margin-top: 2px; }
  .card li.no { color: #97a0ae; }
  .card li .yes-ic { color: #3B6D11; }
  .card li .no-ic { color: #b8422f; }
  .card .btn { width: 100%; }

  /* ---------- SOCIAL PROOF ---------- */
  .proof { background: var(--navy); border-radius: var(--radius); padding: 2.5rem; color: #fff; }
  .quote { border-left: 4px solid var(--naranja); padding-left: 1.4rem; }
  .quote p { font-size: 1.2rem; font-weight: 500; line-height: 1.5; letter-spacing: -.01em; }
  .quote cite { display: block; margin-top: 1rem; font-size: .88rem; font-style: normal;
    color: #9db4d6; }
  .metrics { display: flex; gap: 2.5rem; margin-top: 2rem; flex-wrap: wrap; }
  .metric b { display: block; font-size: 1.6rem; font-weight: 900; color: var(--naranja); }
  .metric span { font-size: .85rem; color: #9db4d6; }

  /* ---------- FAQ ---------- */
  .faq-list { margin-top: 2rem; border-top: 1px solid var(--border); }
  .faq-item { border-bottom: 1px solid var(--border); }
  .faq-q { width: 100%; text-align: left; background: none; border: none; cursor: pointer;
    font: inherit; font-weight: 600; font-size: 1rem; color: var(--navy);
    padding: 1.15rem 0; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
  .faq-q svg { flex-shrink: 0; width: 20px; height: 20px; color: var(--naranja); transition: transform .2s; }
  .faq-item.open .faq-q svg { transform: rotate(45deg); }
  .faq-a { max-height: 0; overflow: hidden; transition: max-height .25s ease; }
  .faq-a p { padding: 0 0 1.15rem; font-size: .93rem; color: var(--muted); max-width: 640px; }

  /* ---------- CTA FINAL ---------- */
  .final { text-align: center; }
  .final h2 { color: var(--navy); }
  .final .form-row { display: flex; gap: .6rem; max-width: 440px; margin: 1.8rem auto .8rem; flex-wrap: wrap; }
  .final input { flex: 1; min-width: 200px; font-family: inherit; font-size: .95rem;
    padding: .85rem 1rem; border: 1.5px solid var(--border); border-radius: 12px; }
  .final input:focus { outline: 2px solid var(--naranja); border-color: transparent; }
  .final .alt { font-size: .9rem; color: var(--muted); }
  .final .alt a { color: var(--naranja); font-weight: 600; }

  /* ---------- FOOTER ---------- */
  footer { background: var(--navy); color: #cdd8e8; padding: 3rem 0 2rem; }
  footer .disclaimer { font-size: .85rem; max-width: 640px; line-height: 1.6; color: #9db4d6; }
  footer .foot-links { display: flex; gap: 1.5rem; margin: 1.5rem 0; flex-wrap: wrap; }
  footer .foot-links a { font-size: .88rem; color: #cdd8e8; }
  footer .foot-links a:hover { color: #fff; }
  footer .copy { font-size: .82rem; color: #7f93b0; border-top: 1px solid rgba(255,255,255,.12);
    padding-top: 1.5rem; }

  /* ---------- MOBILE ---------- */
  @media (max-width: 860px) {
    .nav-links { display: none; }
    .menu-toggle { display: flex; align-items: center; justify-content: center; }
    .compare, .steps, .levels, .cards { grid-template-columns: 1fr; }
    .proof { padding: 1.8rem; }
    .quote p { font-size: 1.05rem; }
    section { padding: 3.2rem 0; }
    .card.featured { order: -1; }
  }
</style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav>
  <div class="wrap nav-inner">
    <a href="/" class="brand">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

</nav>

<!-- ============ HERO ============ -->
<header class="hero">

      <a href="/app" class="btn btn-outline btn-lg" data-i18n="hero_cta2"></a>

    <p class="reassure" data-i18n="hero_reassure"></p>

</header>

<!-- ============ PROBLEMA ============ -->
<section id="problema">
  <div class="wrap">
    <div class="eyebrow" data-i18n="prob_eyebrow"></div>
    <h2 class="section-title" data-i18n="prob_title"></h2>
    <p class="section-lead" data-i18n="prob_body"></p>
    <div class="compare">
      <div class="compare-col without">
        <h4 data-i18n="prob_without_h"></h4>
        <ul id="probWithout"></ul>
      </div>
      <div class="compare-col with">
        <h4 data-i18n="prob_with_h"></h4>
        <ul id="probWith"></ul>
      </div>

    <div class="steps">
      <div class="step">
        <div class="step-num">01</div>
        <h3 data-i18n="how_s1_t"></h3>
        <p data-i18n="how_s1_d"></p>

      <div class="step">
        <div class="step-num">02</div>
        <h3 data-i18n="how_s2_t"></h3>
        <p data-i18n="how_s2_d"></p>

      <div class="step">
        <div class="step-num">03</div>

      <div class="level lvl-critica"><span class="dot"></span><div><h4 data-i18n="det_l1_t"></h4><p data-i18n="det_l1_d"></p></div></div>
      <div class="level lvl-importante"><span class="dot"></span><div><h4 data-i18n="det_l2_t"></h4><p data-i18n="det_l2_d"></p></div></div>
      <div class="level lvl-menor"><span class="dot"></span><div><h4 data-i18n="det_l3_t"></h4><p data-i18n="det_l3_d"></p></div></div>
      <div class="level lvl-conforme"><span class="dot"></span><div><h4 data-i18n="det_l4_t"></h4><p data-i18n="det_l4_d"></p></div></div>

<script>

  function detectLang() {
    const saved = localStorage.getItem(LS_KEY);
    if (saved && SUPPORTED.includes(saved)) return saved;
    const nav = (navigator.language || "es").slice(0, 2).toLowerCase();
    return SUPPORTED.includes(nav) ? nav : "es";
  }
  // catalán oculto: si el guardado es ca, se respeta; si no, solo es/en por UI
  let lang = detectLang();
  if (lang === "ca" && !localStorage.getItem(LS_KEY)) lang = "es";

  const $ = (s, all=false) => all ? document.querySelectorAll(s) : document.querySelector(s);

  function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

  function applyLang() {
    const t = I18N[lang];
    document.documentElement.lang = lang;

    document.querySelectorAll("[data-i18n]").forEach(el => {
      const k = el.getAttribute("data-i18n");
      if (t[k] !== undefined) el.innerHTML = t[k];
    });
    document.querySelectorAll("[data-i18n-ph]").forEach(el => {
      const k = el.getAttribute("data-i18n-ph");
      if (t[k] !== undefined) el.placeholder = t[k];
    });

    // listas dinámicas
    $("#probWithout").innerHTML = t.prob_without.map(x => `<li>${ICON_X}<span>${esc(x)}</span></li>`).join("");
    $("#probWith").innerHTML = t.prob_with.map(x => `<li>${ICON_CHECK}<span>${esc(x)}</span></li>`).join("");
    $("#howPills").innerHTML = t.how_pills.map(x => `<span class="pill">${esc(x)}</span>`).join("");
    $("#findingsList").innerHTML = t.det_findings.map(x => `<li>${ICON_ALERT}<span>${esc(x)}</span></li>`).join("");

    const feat = (arr) => arr.map(([type, txt]) =>
      `<li class="${type==='no'?'no':''}">${type==='yes'?ICON_YES:ICON_NO}<span>${esc(txt)}</span></li>`).join("");
    $("#easyFeatures").innerHTML = feat(t.price_easy_features);
    $("#comfortFeatures").innerHTML = feat(t.price_comfort_features);
    $("#entFeatures").innerHTML = feat(t.price_ent_features);

    $("#faqList").innerHTML = t.faq.map(([q, a], i) => `
      <div class="faq-item">
        <button class="faq-q" data-faq="${i}">${esc(q)}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="faq-a"><p>${esc(a)}</p></div>
      </div>`).join("");
    bindFaq();

    document.querySelectorAll(".lang-switch button").forEach(b =>
      b.classList.toggle("active", b.dataset.lang === lang));
  }

  function bindFaq() {
    document.querySelectorAll(".faq-q").forEach(btn => {
      btn.addEventListener("click", () => {
        const item = btn.closest(".faq-item");
        const open = item.classList.contains("open");
        document.querySelectorAll(".faq-item").forEach(i => {
          i.classList.remove("open");
          i.querySelector(".faq-a").style.maxHeight = null;
        });
        if (!open) {
          item.classList.add("open");
          const a = item.querySelector(".faq-a");
          a.style.maxHeight = a.scrollHeight + "px";
        }
      });
    });
  }

  document.querySelectorAll(".lang-switch button").forEach(b => {
    b.addEventListener("click", () => {
      lang = b.dataset.lang;
      localStorage.setItem(LS_KEY, lang);
      applyLang();
    });
  });

  $("#menuToggle").addEventListener("click", () => {
    document.querySelector(".nav-links").style.display =
      document.querySelector(".nav-links").style.display === "flex" ? "" : "flex";
  });

  $("#finalBtn").addEventListener("click", () => { window.location.href = "/app"; });

  applyLang();
})();
</script>
</body>
</html>
